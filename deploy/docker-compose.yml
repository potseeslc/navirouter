services:
  navirouter:
    build: ..
    container_name: navirouter
    restart: unless-stopped
    environment:
      PORT: 8098
      NAVIDROME_URL: ${NAVIDROME_URL:-http://navidrome:4533}
      AUDIOMUSE_URL: ${AUDIOMUSE_URL:-http://audiomuse:8000}
      NAVIDROME_DB_PATH: ${NAVIDROME_DB_PATH:-}
      NAVIDROME_DB_CONTAINER: ${NAVIDROME_DB_CONTAINER:-}
      NAVIROUTER_DOCKER_CLI: ${NAVIROUTER_DOCKER_CLI:-/usr/local/bin/docker}
      AUDIOMUSE_API_TOKEN: ${AUDIOMUSE_API_TOKEN:-}
      AUDIOMUSE_API_TOKEN_FILE: ${AUDIOMUSE_API_TOKEN_FILE:-}
      NAVIROUTER_ALLOWED_NAVIDROME_HOSTS: ${NAVIROUTER_ALLOWED_NAVIDROME_HOSTS:-navidrome:4533}
      NAVIROUTER_ALLOWED_AUDIOMUSE_HOSTS: ${NAVIROUTER_ALLOWED_AUDIOMUSE_HOSTS:-audiomuse:8000}
      NAVIROUTER_MAX_BODY_BYTES: ${NAVIROUTER_MAX_BODY_BYTES:-1048576}
      NAVIROUTER_SONG_CACHE_TTL_SECONDS: ${NAVIROUTER_SONG_CACHE_TTL_SECONDS:-300}
      NAVIROUTER_SONG_CACHE_MAX: ${NAVIROUTER_SONG_CACHE_MAX:-5000}
      NAVIROUTER_RESOLVE_CONCURRENCY: ${NAVIROUTER_RESOLVE_CONCURRENCY:-8}
      NAVIROUTER_RECENT_REQUESTS_LIMIT: ${NAVIROUTER_RECENT_REQUESTS_LIMIT:-25}
      NAVIROUTER_WEBHOOK_URL: ${NAVIROUTER_WEBHOOK_URL:-}
      NAVIROUTER_WEBHOOK_EVENTS: ${NAVIROUTER_WEBHOOK_EVENTS:-radio.generated,radio.playback_confirmed,radio.fallback}
      NAVIROUTER_WEBHOOK_SECRET: ${NAVIROUTER_WEBHOOK_SECRET:-}
      NAVIROUTER_WEBHOOK_SECRET_FILE: ${NAVIROUTER_WEBHOOK_SECRET_FILE:-}
      NAVIROUTER_WEBHOOK_TIMEOUT_MS: ${NAVIROUTER_WEBHOOK_TIMEOUT_MS:-3000}
      NAVIROUTER_WEBHOOK_QUEUE_MAX: ${NAVIROUTER_WEBHOOK_QUEUE_MAX:-100}
      NAVIROUTER_FALLBACK_RESPONSE_MAX_BYTES: ${NAVIROUTER_FALLBACK_RESPONSE_MAX_BYTES:-1048576}
      NAVIROUTER_RADIO_CORRELATION_TTL_SECONDS: ${NAVIROUTER_RADIO_CORRELATION_TTL_SECONDS:-21600}
    ports:
      - "${NAVIROUTER_PORT:-8098}:8098"
